  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #fff;
  --top-bg: #fff;
  --top-text: rgba(0,0,0,0.6);
  --top-border: rgba(0,0,0,0.1);
  --bar-bg: #fff;
  --bar-text: #000;
  --bar-border: rgba(0,0,0,0.15);
  --btn-border: rgba(0,0,0,0.3);
}

[data-theme='dark'] {
  --bg: #000;
  --top-bg: #000;
  --top-text: #fff;
  --top-border: rgba(255,255,255,0.1);
  --bar-bg: #000;
  --bar-text: #fff;
  --bar-border: rgba(255,255,255,0.1);
  --btn-border: rgba(255,255,255,0.3);
}

    html, body {
      background: var(--bg);
      transition: background 0.3s, color 0.3s;
    }

    body {
      color: var(--text);
      font-family: 'Century Gothic', Helvetica, Arial, sans-serif;
      opacity: 0;
      animation: fadeIn 0.35s ease forwards;
    }

    @keyframes fadeIn {
      to { opacity: 1; }
    }

    /* TOP BAR */
    .top-bar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 60px;
      background: var(--top-bg);
      display: flex;
      align-items: center;
      gap: 0.8rem;
      padding: 0 1rem;
      z-index: 100;
      border-bottom: 1px solid var(--top-border);
      transition: background 0.3s, border-color 0.3s;
    }

    .profile-thumb {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      object-fit: cover;
      object-position: center;
      flex-shrink: 0;
    }

    .top-quote {
      font-size: 0.78rem;
      font-style: italic;
      color: var(--top-text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      transition: color 0.3s;
    }

    /* PHOTO GRID */
    .photo-grid {
      margin-top: 52px;
      margin-bottom: 60px;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 0px;
      background: var(--bg);
      transition: background 0.3s;
    }

    .photo-grid img {
      width: 100%;
      height: auto;
      display: block;
    }

    /* BOTTOM BAR */
    .bottom-bar {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      height: 60px;
      background: var(--bar-bg);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 1.2rem;
      z-index: 100;
      border-top: 1px solid var(--bar-border);
      transition: background 0.3s, border-color 0.3s;
    }

    .bottom-bar button {
      background: transparent;
      border: 1px solid var(--btn-border);
      border-radius: 6px;
      color: var(--bar-text);
      font-size: 1.4rem;
      cursor: pointer;
      width: 48px;
      height: 44px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      transition: border-color 0.3s, color 0.3s;
    }
  </style>
</head>

<script type="module">

import { createAppKit } from '@reown/appkit'
import { WagmiAdapter } from '@reown/appkit-adapter-wagmi'
import { mainnet, polygon, base } from '@reown/appkit/networks'


const projectId = 'd759ea6b6772ffe841237056e50c84e6'

const networks = [
  mainnet,
  polygon,
  base
]


const wagmiAdapter = new WagmiAdapter({
  projectId,
  networks
})


const modal = createAppKit({
  adapters: [wagmiAdapter],
  networks,
  metadata: {
    name: 'Anand Sharma Art',
    description: 'Digital Art Gallery & Marketplace',
    url: window.location.origin,
    icons: ['https://yourdomain.com/favicon.ico']
  },
  projectId,
  excludeWalletIds: [
    '8a0ee50d1f22f6651afcae7eb4253e52a3310b90af5daef78a8c4929a9bb99d4'
  ],
  features: {
    analytics: false,
    connectMethodsOrder: ['wallet'],
    networkSwitcher: false
  },
  featuredWalletIds: [
    'c57ca95b47569778a828d19178114f4db188b89b763c899ba0be274e97267d96',
    '4622a2b2d6af1c9844944291e5e7351a6aa24cd7b23099efac1b2fd875da31a0',
    'fd20dc426fb37566d803205b19bbc1d4096b248ac04548e3cfb6b3a38bd033aa'
  ],
  enableWalletConnect: false
})


console.log(modal)
console.log('after AppKit')

// ===== CONNECT BUTTON =====
const connectBtn = document.getElementById('connect-button')

if (connectBtn) {
  connectBtn.addEventListener('click', async () => {
    console.log('CONNECT BUTTON CLICKED')

    try {
      console.log('modal.open exists:', typeof modal.open)

      const result = await modal.open({ view: 'Connect' })

      console.log('OPEN CALLED SUCCESSFULLY')
      console.log('OPEN RESULT:', result)

      // Check whether modal element appeared
      setTimeout(() => {
        console.log(
          'appkit modal:',
          document.querySelector('appkit-modal')
        )

        console.log(
          'w3m modal:',
          document.querySelector('w3m-modal')
        )
      }, 1000)

    } catch (err) {
      console.error('OPEN FAILED')
      console.error(err)
    }
  })
}

modal.subscribeEvents((event) => {
  const eventData = event?.data
  const btn = document.getElementById('connect-button')
  if (!btn) return

  if (eventData?.event === 'CONNECT_SUCCESS') {
    btn.classList.add('connected')
  }
  if (
    eventData?.event === 'DISCONNECT_SUCCESS' ||
    eventData?.event === 'DISCONNECTED' ||
    eventData?.event === 'LOGOUT'
  ) {
    btn.classList.remove('connected')
  }
})

modal.subscribeEvents(event => {
  const btn = document.getElementById('connect-button')
  if (!btn) return

  if (event.data.event === 'connected') {
    btn.classList.add('connected')
    btn.textContent = 'Connected'
  } else if (event.data.event === 'disconnected') {
    btn.classList.remove('connected')
    btn.textContent = 'Connect Wallet'
  }
})



</script>
  <script>
    // Random quote
const quotes = [
  "Sometimes, things don't always go to plan.",
  "I hate you more than I love me, and I love me very much.",
  "Your sins are yours, and my sins are also yours.",
  "Call him the biggest coward, he who fears the truth.",
  "Know your enemy.",
  "Press the damn button.",
  "They took my best years from me.",
  "When I meet a sinless man, I will claim to have found God."
]
const quoteEl = document.getElementById('top-quote')
if (quoteEl) {
  quoteEl.textContent = '\u201C' + quotes[Math.floor(Math.random() * quotes.length)] + '\u201D'
}

// Theme
const toggleBtn = document.getElementById('theme-toggle')
const profileImg = document.getElementById('profile-img')

function applyTheme(theme) {
  document.documentElement.setAttribute('data-theme', theme)
  toggleBtn.textContent = theme === 'dark' ? '☀️' : '🌙'
  profileImg.src = theme === 'dark'
    ? 'images/profile_white.jpg'
    : 'images/profile_black.jpg'
}

// Read initial theme from html attribute, don't force it
const initialTheme = document.documentElement.getAttribute('data-theme') || 'dark'
toggleBtn.textContent = initialTheme === 'dark' ? '☀️' : '🌙'
profileImg.src = initialTheme === 'dark'
  ? 'images/profile_white.jpg'
  : 'images/profile_black.jpg'

toggleBtn.addEventListener('click', () => {
  const current = document.documentElement.getAttribute('data-theme')
  applyTheme(current === 'dark' ? 'light' : 'dark')
})

// Home
const homeBtn = document.getElementById('home-button')
if (homeBtn) {
  homeBtn.addEventListener('click', () => {
    window.location.href = '/'
  })
}

// ===== EMAIL BUTTON =====
// On click: copy email, button shows ✓ for 1s then reverts to ✉️
const emailBtn = document.getElementById('email-button')
const email = 'youremail@example.com'

if (emailBtn) {
  emailBtn.addEventListener('click', async () => {

    const original = emailBtn.textContent

    // Change button immediately
    emailBtn.textContent = '✅'

    setTimeout(() => {
      emailBtn.textContent = original
    }, 1000)

    // Copy email in the background
    try {
      await navigator.clipboard.writeText(email)
    } catch (err) {
      console.log('Clipboard failed')
    }

  })
}

  </script>
