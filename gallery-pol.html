<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Anand Sharma – Digital Artist</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>

  <header>
    <div class="section-inner header-content">
      <div class="header-text">
        <h1>Anand Sharma | <i lang="hi">कलाकार</i></h1>
        <p><q id="random-quote"></q></p>
      </div>
      <div class="header-right">
        <img src="images/profile_black.jpg" alt="Profile (dark)" class="profile-pic dark-mode-img" />
        <img src="images/profile_white.jpg" alt="Profile (light)" class="profile-pic light-mode-img" />
        <div class="header-buttons">
          <button id="email-button">✉️</button>
          <button id="home-button">🏠</button>
          <button id="theme-toggle">☀️</button>
          <button id="connect-button">🦊</button>
        </div>
      </div>
    </div>
  </header>

   <main class="section-inner"> 
   <!--- <h2>Gallery</h2> =-->
    <div class="grid">

        <figure>
            <img src="images/artwork1.jpg" alt="Artwork 1" loading="lazy">
            <figcaption>symmetry</figcaption>
            <div class="buy-box">
            	<button class="buy-button">Buy Now</button>
              	<div class="price">
                    <img src="images/pol-logo.svg" class="eth-logo">
                <span>0.25 POL</span>
              </div>
            </div>
          </figure>

          <figure>
            <img src="images/artwork2.jpg" alt="Artwork 1" loading="lazy">
            <figcaption>swarm</figcaption>
            <div class="buy-box">
              <button class="buy-button">Buy Now</button>
              <div class="price">
                <img src="images/pol-logo.svg" class="eth-logo">
                <span>0.25 POL</span>
              </div>
            </div>
          </figure>

          <figure>
            <img src="images/artwork3.jpg" alt="Artwork 1" loading="lazy">
            <figcaption>rocketman</figcaption>
            <div class="buy-box">
              <button class="buy-button">Buy Now</button>
              <div class="price">
                <img src="images/pol-logo.svg" class="eth-logo">
                <span>0.25 POL</span>
              </div>
            </div>
          </figure>

          <figure>
            <img src="images/artwork4.jpg" alt="Artwork 1" loading="lazy">
            <figcaption>circle</figcaption>
            <div class="buy-box">
              <button class="buy-button">Buy Now</button>
              <div class="price">
               <img src="images/pol-logo.svg" class="eth-logo">
                <span>0.25 POL</span>
              </div>
            </div>
          </figure>

          

    </div>


  </main>

  <footer>
    &copy; 2025 Anand Sharma. All rights reserved.
  </footer>


  <!-- JS logic from main.js -->
  <script type="module" src="/main.js"></script>

</body>
</html>
