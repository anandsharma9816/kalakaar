    * { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Century Gothic', 'CenturyGothic', 'AppleGothic', Futura, 'Trebuchet MS', Arial, sans-serif;
  height: 100vh;
  display: flex;
  overflow: hidden;

  opacity: 1;
  transform: scale(1);
  transition:
    opacity 0.35s ease,
    transform 0.35s ease;
}

body.fade-out {
  opacity: 0;
  transform: scale(0.98);
}

    /* LEFT PANEL */
    .left {
      width: 40%;
      background: #000;
      color: #fff;
      padding: 3rem 2.5rem;
      display: flex;
      flex-direction: column;
      justify-content: center; /* Centers content vertically */
      align-items: center;     /* Centers content horizontally */
    }

    .content-wrapper {
      max-width: 440px;
      width: 100%;
    }

    /* HEADING STYLES FROM IMAGE_202997.PNG */
    .name-heading {
      font-size: 2.2rem;
      font-weight: 700;
      letter-spacing: 0.5px;
      line-height: 1.25;
      margin-bottom: 2.5rem;
      white-space: nowrap;
    }

    .name-hindi {
      font-weight: 400;
      letter-spacing: 1px;
    }

    /* POEM STYLES WITH TIGHTER BOTTOM GAP */
    .poem {
      font-size: 1rem;
      line-height: 1.8;
      opacity: 0.9;
      margin-bottom: 1.5rem; /* Pulled up closer to the icon buttons */
    }

    .poem .stanza {
      display: block;
    }

    .poem .gap {
      display: block;
      height: 1.2rem;
    }

    /* MINIMALIST ICON BUTTON ROW */
    .chain-section {
      display: flex;
      gap: 0.8rem;
      align-items: center;
    }

.chain-btn { background: transparent; border: 1px solid rgba(255, 255, 255, 0.4); border-radius: 6px; color: #fff; cursor: pointer; width: 48px; /* Matches gallery icon button proportions */ height: 40px; /* Matches gallery icon button proportions */ display: inline-flex; align-items: center; justify-content: center; transition: background-color 0.2s, border-color 0.2s; text-decoration: none; }

    /* INDIVIDUAL SYSTEM HOVER THEMES */
    .btn-eth:hover {
      background-color: rgba(126, 184, 245, 0.15);
      border-color: #7eb3f5;
    }

    .btn-sol:hover {
      background-color: rgba(20, 241, 149, 0.12);
      border-color: #14F195;
    }

    .btn-poly:hover {
      background-color: rgba(130, 71, 229, 0.15);
      border-color: #8247e5;
    }

    .chain-icon {
      width: 23px;
      height: 23px;
      display: block;
    }

    /* RIGHT PANEL */
    .right {
      flex: 1;
      background: #111;
      position: relative;
      overflow: hidden;
      display: flex;
      gap: 0;
    }

    /* ELEVATOR COLUMNS */
    .col {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 4px;
      position: absolute;
      top: 0;
      width: calc(25% - 3px);
      will-change: transform;
    }

    .col:nth-child(1) { left: 0;                    animation: scrollUp   80s linear infinite; }
    .col:nth-child(2) { left: calc(25% + 1px);      animation: scrollDown 80s linear infinite; }
    .col:nth-child(3) { left: calc(50% + 2px);      animation: scrollUp   80s linear infinite; }
    .col:nth-child(4) { left: calc(75% + 3px);      animation: scrollDown 80s linear infinite; }

    .col img {
      width: 100%;
      height: auto;
      display: block;
      object-fit: cover;
      flex-shrink: 0;
    }
.right:hover img {
  opacity: 0.6;
  transition: opacity 0.2s ease;
}

.right img:hover {
  opacity: 1;
}
    @keyframes scrollUp {
      0%   { transform: translateY(0); }
      100% { transform: translateY(-50%); }
    }

    @keyframes scrollDown {
      0%   { transform: translateY(-50%); }
      100% { transform: translateY(0); }
    }

    /* Fade edges so columns dissolve into the page */
    .right::before,
    .right::after {
      content: '';
      position: absolute;
      left: 0; right: 0;
      height: 120px;
      z-index: 2;
      pointer-events: none;
    }
    .right::before {
      top: 0;
      background: linear-gradient(to bottom, #111 0%, transparent 100%);
    }
    .right::after {
      bottom: 0;
      background: linear-gradient(to top, #111 0%, transparent 100%);
    }

  

    /* Respect reduced motion */
    @media (prefers-reduced-motion: reduce) {
      .col { animation: none !important; }
    }

    /* MOBILE RESPONSIVENESS */
    @media (max-width: 768px) {
      .name-heading { font-size: 1.8rem; white-space: normal; }
    }
    @media (max-width: 640px) {
      body { flex-direction: column; height: auto; overflow: auto; }
      .left { width: 100%; padding: 4rem 1.5rem; }
      .right { height: 60vw; }
    }

  <script>
    document.querySelectorAll('.chain-btn').forEach(button => {

window.addEventListener('load', () => {
  emailInput.focus()
})
const emailInput = document.getElementById('email-input')
const emailValidation = document.getElementById('email-validation')

const SUPABASE_URL = 'https://yahchujwfhqimkparbad.supabase.co'
const SUPABASE_KEY = 'sb_publishable_76TS92dGX6UBZvpVAGXo4w_FGmIipyx'

const isValidEmail = (val) => /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(val)

emailInput.addEventListener('input', () => {
  const val = emailInput.value.trim()
  if (!val) {
    emailValidation.textContent = ''
    return
  }
  emailValidation.textContent = isValidEmail(val) ? '✔' : '✖'
})

emailInput.addEventListener('keydown', async (e) => {
  if (e.key !== 'Enter') return
  const email = emailInput.value.trim()
  if (!isValidEmail(email)) return

  try {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/emails`, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'apikey': SUPABASE_KEY,
        'Authorization': `Bearer ${SUPABASE_KEY}`
      },
      body: JSON.stringify({ email })
    })

    if (res.ok) {
      emailInput.value = ''
      emailValidation.textContent = ''
      emailInput.placeholder = "you're on our list ✔"
      emailInput.disabled = true
    } else {
      emailInput.placeholder = 'try again'
      emailInput.value = ''
      emailValidation.textContent = ''
    }
  } catch {
    emailInput.placeholder = 'try again'
    emailInput.value = ''
    emailValidation.textContent = ''
  }
})
